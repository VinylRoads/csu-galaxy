#search::placeholder {

.rock {

.ice {

.gas {

<script>

const pdfContainer = document.getElementById("pdf-container");
const viewer = document.getElementById("viewer");
const pdfTitle = document.getElementById("pdf-title");
const pdfDownload = document.getElementById("pdf-download");

function openPDF(file){
    // encodeURIComponent страхует нас от проблем, если диспетчер добавит спецсимволы вроде # или %
    let url = "Расписание/" + encodeURIComponent(file);
    let prettyName = file.replace(/_/g, " ").replace(/\.pdf$/i, "");

    // Скрываем плашку со списком файлов
    document.getElementById("files").style.display = "none";

    // Проверка на мобильные устройства
    let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
        // На мобилках отдаем файл системе (новая вкладка работает идеально)
        window.open(url, '_blank');
    } else {
        // На ПК показываем внутри Галактики с красивой шапкой
        pdfTitle.textContent = prettyName;
        pdfDownload.href = url;
        viewer.src = url;
        pdfContainer.style.display = "flex";
    }
}

// Кнопка закрытия
document.getElementById("pdf-close").addEventListener("click", function(){
    pdfContainer.style.display = "none";
    viewer.src = "";
});

window.addEventListener("keydown", e => {
    if(e.key === "Escape"){
        pdfContainer.style.display = "none";
        viewer.src = "";
    }
});

let directions = {}
let schedule = {}
let planets = []
let rings = []
let mode = "directions"

// Используем Date.now() для 100% обхода кэширования на всех устройствах
fetch("schedule.json?v=" + Date.now(), {cache: "no-store"})
.then(r => r.json())
.then(data=>{
schedule = data
})

function showFiles(group){

let files = schedule[group]

if(!files) return

let box = document.getElementById("files")
box.style.display="block"

box.innerHTML=""

let title=document.createElement("b")
title.textContent=group
box.appendChild(title)

box.appendChild(document.createElement("br"))
box.appendChild(document.createElement("br"))

files.forEach(f=>{

let div=document.createElement("div")

div.style.margin="6px 0"
div.style.cursor="pointer"
div.style.color="#60a5fa"

// Убираем подчеркивания и расширение .pdf для красоты
let prettyName = f.replace(/_/g, " ").replace(/\.pdf$/i, "");
div.textContent = prettyName;

div.onclick=()=>openPDF(f)

box.appendChild(div)

})

let close=document.createElement("div")
close.textContent="закрыть"

close.style.marginTop="10px"
close.style.color="#aaa"
close.style.cursor="pointer"

close.onclick=()=>box.style.display="none"

box.appendChild(close)

}

fetch("groups.json?" + Date.now())
.then(r => r.json())
.then(data => {

directions = data
createPlanets(Object.keys(directions))

})

container._tx = 0
container._ty = 0

let w=window.innerWidth

let cx=w/2

w=window.innerWidth

// ЖЕСТКО ФИКСИРУЕМ ВЫСОТУ В ПИКСЕЛЯХ

cx=w/2

let lastWidth = window.innerWidth
let lastHeight = window.innerHeight

window.addEventListener("resize",()=>{

let newW = window.innerWidth
let newH = window.innerHeight


if(newW === lastWidth){
lastHeight = newH
return
}

lastWidth = newW
lastHeight = newH

updateSize()

if(mode==="directions")
createPlanets(Object.keys(directions))
else
createPlanets(directions[label.textContent])

})

const types=["rock","ice","gas","lava"]

function typeFromName(name){
let n=0
for(let i=0;i<name.length;i++) n+=name.charCodeAt(i)
return types[n%types.length]
}

// === УМНЫЙ ЦЕНТР ГАЛАКТИКИ ===
let centralPlanet = document.createElement("div");
centralPlanet.style.position = "absolute"; 
centralPlanet.style.left = "50%";
centralPlanet.style.top = "50%";
centralPlanet.style.transform = "translate(-50%, -50%)";
centralPlanet.style.cursor = "default";
centralPlanet.style.zIndex = "10"; 


container.appendChild(centralPlanet);



let label = { textContent: "ЧелГУ" }; // Сохраняем переменную для логики скрипта

function updateCenter(name) {
    label.textContent = name;
    centralPlanet.innerText = name;
    
    let distantSun = document.getElementById("distant-sun"); 
    
    if (name === "ЧелГУ") {
        // МОМЕНТАЛЬНЫЙ ВОЗВРАТ
        centralPlanet.style.transition = "none";
        distantSun.classList.remove("visible");

let angle =
arm * (Math.PI * 2 / armCount) +
spiral

let maxRadius = base * 0.48

let radius

if(mode === "directions") {

    radius = base * 0.18 + (i * (base * 0.035));
}

// Добавляем сдвиг по углу, чтобы они не выстраивались в ровную линию

}

if (mode === "directions" && window.facultyStyles[name]) {

if(el.classList.contains("blackhole")){

container.appendChild(el)

// === СПУТНИКИ-ПОДСКАЗКИ (1 спутник = 1 группа) ===
// Делаем это только для факультетов
if (mode === "directions" && directions[name]) {
    let groupCount = directions[name].length; // Считаем количество групп
    
    // Ограничиваем максимум 24 лунами, чтобы не было слипшейся каши на больших факультетах

}

// Создаем кольца у планет (только 1 на сессию и не у черной дыры)
let canHaveRing = mode === "directions" && !el.classList.contains("blackhole");


if (canHaveRing && (window.planetWithRing === name || (!window.planetWithRing && Math.random() < 0.4))) {
    window.planetWithRing = name; 
    
    let ringAsteroids = [];
    for(let a=0; a<70; a++){

        });

    rings.push({

    });
}



// Сразу ставим планету на её законную орбиту, чтобы она не появлялась в центре Солнца
let startX = cx + Math.cos(angle) * radius;
let startY = cy + Math.sin(angle) * radius;
el.style.transform = `translate(${startX}px, ${startY}px) translate(-50%, -50%)`;
el._x = startX;
el._y = startY;


el.addEventListener("pointerenter", () => el._hoverScale = 1.2);

el._hoverScale = 1;

planets.push({
name,
el,
radius,
angle,
speed:mode==="directions"
? 0.00012 + Math.random()*0.00008
: 0.00035 + Math.random()*0.0002,
centerX: cx,
centerY: cy,
halfSize: size / 2 // Кэшируем половину размера для быстрой отрисовки
})

})

// === КОЛЬЦО АСТЕРОИДОВ ВОКРУГ ЦЕНТРАЛЬНОЙ ПЛАНЕТЫ ===

if (mode === "groups" && label.textContent === window.planetWithRing) {
    let ringAsteroids = [];

        asteroid.style.opacity = 0.5 + Math.random() * 0.5;
        asteroid.style.willChange = "transform";
        asteroid.style.backfaceVisibility = "hidden";
        container.appendChild(asteroid);
        
        ringAsteroids.push({
            el: asteroid,
            s: s,
            angle: Math.random() * Math.PI * 2,
            // Физика: кольцо БЛИЖЕ к планете (0.12), чем орбиты групп (начинаются с 0.18)
            radius: base * 0.12 + Math.random() * (base * 0.025),
            tilt: 0.25,
            speed: 0.001 + Math.random() * 0.002
        });
    }
    rings.push({
        isCentral: true, 
        asteroids: ringAsteroids
    });
}

}



function resetHome(){

mode="directions"

function findGroup(query){

query=query.toLowerCase()

let best=null
let bestDir=null
let bestScore=0

for(let d in directions){

for(let g of directions[d]){

let gl=g.toLowerCase()

if(gl.includes(query)){

let score=query.length/gl.length

if(score>bestScore){
best=g
bestDir=d
bestScore=score
}

}

}

}

return {group:best,dir:bestDir}

}

let drag=false
let vel=0

window.addEventListener("pointerdown",()=>drag=true)
window.addEventListener("pointerup",()=>drag=false)

window.addEventListener("pointermove",e=>{

mouseX = (e.clientX - w/2) / w
mouseY = (e.clientY - h/2) / h

if(!drag)return

// Ограничиваем скорость, чтобы нельзя было раскрутить слишком сильно
let delta = e.movementX * 0.00015;
vel = Math.min(Math.max(vel + delta, -0.025), 0.025);

})

let zoom=1
let camTargetX = 0
let camTargetY = 0
let camMoving = false

let mouseX = 0
let mouseY = 0

window.addEventListener("wheel",e=>{

zoom += e.deltaY * -0.001

if(!isFinite(zoom)) zoom = 1

zoom = Math.min(Math.max(.5,zoom),2)

container.style.transform =
`translate(${container._tx}px, ${container._ty}px) scale(${zoom})`

})

// === МОБИЛЬНЫЙ ЗУМ (ЩИПОК ДВУМЯ ПАЛЬЦАМИ) ===
let initialDistance = null;
let initialZoom = 1;

window.addEventListener("touchstart", e => {
    if (e.touches.length === 2) {
        // Вычисляем расстояние между двумя пальцами при касании
        initialDistance = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        initialZoom = zoom;
    }
});

window.addEventListener("touchmove", e => {
    if (e.touches.length === 2 && initialDistance) {
        let currentDistance = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        
        let scale = currentDistance / initialDistance;
        zoom = initialZoom * scale;
        
        zoom = Math.min(Math.max(.5, zoom), 2);
        
        container.style.transform = 
        `translate(${container._tx}px, ${container._ty}px) scale(${zoom})`;
    }
}, { passive: true }); // passive: true немного ускоряет обработку свайпов

window.addEventListener("touchend", e => {
    // Сбрасываем начальное расстояние, если пальцев меньше двух
    if (e.touches.length < 2) {
        initialDistance = null;
    }
});


function draw(){

// Вызываем следующий кадр
requestAnimationFrame(draw);


galaxyRotation += 0.00015

dustRotation += 0.00025


dustLayer.style.transform = `translate(${mouseX*40}px, ${mouseY*40}px) rotate(${dustRotation}rad)`

 

for(let i=0;i<starList.length;i++){

let s=starList[i]

s._o += (Math.random()-.5)*.05;
if (s._o < 0.2) s._o = 0.2;
else if (s._o > 1) s._o = 1;


if (Math.abs((s._lastO || 0) - s._o) > 0.05) {
    s.setAttribute("opacity", s._o.toFixed(2));
    s._lastO = s._o;
}

// Двигаем звезды только если есть скорость (vel)
if (Math.abs(vel) > 0.0001) {
    s._x += vel * 200 * s._parallax;
    if(s._x > w) s._x = 0;
    if(s._x < 0) s._x = w;
    s.setAttribute("cx", s._x);
}

}


for(let i=0;i<planets.length;i++){

let p=planets[i]

p.angle += p.speed + vel

let centerX = p.centerX ?? cx
let centerY = p.centerY ?? cy

let x = centerX + Math.cos(p.angle)*p.radius
let y = centerY + Math.sin(p.angle)*p.radius

p.el.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%) scale(${p.el._hoverScale})`;

p.el._x = x;
p.el._y = y;

}

// движение астероидных колец
for(let r of rings){
    let px, py;
    
    if (r.isCentral) {
        px = cx; // Центральное кольцо привязано к центру экрана
        py = cy;
    } else {
        let planetObj = planets.find(p => p.el === r.planet);
        if(!planetObj) continue;
        px = planetObj._x || planetObj.el._x || 0;
        py = planetObj._y || planetObj.el._y || 0;
    }

    for(let a of r.asteroids){
        a.angle += a.speed || 0.005;

        let x = px + Math.cos(a.angle) * a.radius;
        let y = py + Math.sin(a.angle) * a.radius * a.tilt;

        let offset = a.s ? (a.s / 2) : 1;
        a.el.style.transform = `translate(${x - offset}px, ${y - offset}px)`;
        
        
        if (Math.sin(a.angle) > 0) {
            a.el.style.zIndex = "15"; 
        } else {
            a.el.style.zIndex = "5";
        }
    }

}



if(camMoving){
    let dx = camTargetX - container._tx;
    let dy = camTargetY - container._ty;

    // Ускорили полет камеры на 50% (было 0.08)
    container._tx += dx * 0.12;
    container._ty += dy * 0.12;

 
    let camSpeed = Math.hypot(dx, dy); 
    
    let blurAmount = Math.min(camSpeed * 0.015, 4); 
    
    container.style.filter = `blur(${blurAmount}px)`;
    orbitLayer.style.filter = `blur(${blurAmount}px)`;

    
    if(Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5){
        camMoving = false;
        container.style.filter = "none"; 
        orbitLayer.style.filter = "none";
    }
} else {
    
    container.style.filter = "none";
    orbitLayer.style.filter = "none";
}


let camTransform = `translate(${container._tx}px, ${container._ty}px) scale(${zoom})`;

container.style.transform = camTransform;
orbitLayer.style.transform = `${camTransform} rotate(${galaxyRotation}rad)`;



vel*=0.96


}

// Единая функция для возврата в главное меню
function goBack() {
    resetHome();
    searchInput.value = "";
}



document.getElementById("distant-sun").onclick = goBack;

draw()
